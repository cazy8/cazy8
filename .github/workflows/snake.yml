name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"     # rebuild daily
  workflow_dispatch:         # allow manual trigger
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: cazy8
          outputs: |
            dist/github-snake.svg?color_snake=%23A78BFA&color_dots=%230d1117,%23241a3d,%234b2e91,%236f42c1,%23A78BFA
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23A78BFA&color_dots=%230d1117,%23241a3d,%234b2e91,%236f42c1,%23A78BFA

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
